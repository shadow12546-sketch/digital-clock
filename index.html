<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digital Clock</title>
<style>
  :root{
    --body-dark: #232324;
    --body-darker: #161617;
    --panel: #0c0d0a;
    --led: #ff5a1f;
    --led-dim: #4a2410;
    --led-glow: rgba(255, 90, 31, 0.65);
    --amber: #ffb347;
    --screw: #55565a;
  }

  *{ box-sizing: border-box; }

  html, body{
    height: 100%;
    margin: 0;
  }

  body{
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background:
      radial-gradient(circle at 30% 20%, #3a3a3d 0%, #17171a 55%, #0a0a0b 100%);
    font-family: 'Segoe UI', Roboto, Arial, sans-serif;
  }

  .radio{
    position: relative;
    width: 480px;
    max-width: 92vw;
    padding: 34px 38px 40px;
    border-radius: 26px;
    background:
      linear-gradient(155deg, #2c2c2e 0%, var(--body-dark) 40%, var(--body-darker) 100%);
    box-shadow:
      0 30px 60px rgba(0,0,0,0.55),
      0 2px 0 rgba(255,255,255,0.04) inset,
      0 -6px 18px rgba(0,0,0,0.5) inset;
  }

  .radio::before{
    content:"";
    position:absolute;
    inset: 10px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.03);
    pointer-events:none;
  }

  .brand{
    display:flex;
    align-items:center;
    justify-content: space-between;
    margin-bottom: 18px;
    color: #7a7a7d;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 600;
  }

  .brand .power{
    display:flex;
    align-items:center;
    gap:6px;
    color:#5f6062;
  }

  .power-dot{
    width:7px; height:7px;
    border-radius:50%;
    background: #2c9d4c;
    box-shadow: 0 0 6px 2px rgba(44,157,76,0.8);
  }

  .screen{
    position: relative;
    background:
      linear-gradient(180deg, #0a0b08 0%, var(--panel) 100%);
    border-radius: 14px;
    padding: 26px 20px 20px;
    box-shadow:
      0 0 0 2px #000 inset,
      0 0 30px rgba(0,0,0,0.6) inset,
      0 6px 14px rgba(0,0,0,0.5);
  }

  .screen::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius: 14px;
    background: repeating-linear-gradient(
      0deg,
      rgba(255,255,255,0.015) 0px,
      rgba(255,255,255,0.015) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events:none;
  }

  .date-row{
    text-align:center;
    color: var(--amber);
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 14px;
    opacity: 0.85;
    text-shadow: 0 0 8px rgba(255,179,71,0.5);
  }

  .time-row{
    display:flex;
    align-items: flex-end;
    justify-content: center;
    gap: 6px;
    line-height: 1;
  }

  .time-main{
    font-family: 'Consolas', 'Courier New', monospace;
    font-weight: 700;
    font-size: 88px;
    letter-spacing: 4px;
    color: var(--led);
    text-shadow:
      0 0 6px var(--led-glow),
      0 0 18px var(--led-glow),
      0 0 40px rgba(255,90,31,0.35);
    font-variant-numeric: tabular-nums;
  }

  .colon{
    animation: blink 1s steps(1) infinite;
  }

  @keyframes blink{
    0%, 49%{ opacity: 1; }
    50%, 100%{ opacity: 0.15; }
  }

  .seconds-block{
    display:flex;
    flex-direction: column;
    align-items:center;
    margin-left: 8px;
    margin-bottom: 8px;
  }

  .time-seconds{
    font-family: 'Consolas', 'Courier New', monospace;
    font-weight: 700;
    font-size: 34px;
    color: var(--led);
    text-shadow: 0 0 6px var(--led-glow), 0 0 14px var(--led-glow);
    font-variant-numeric: tabular-nums;
  }

  .meridiem{
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--amber);
    text-shadow: 0 0 8px rgba(255,179,71,0.5);
    margin-top: 2px;
  }

  .ghost{
    color: var(--led-dim);
    text-shadow: none;
  }

  .controls{
    display:flex;
    justify-content: center;
    gap: 22px;
    margin-top: 26px;
  }

  .dial{
    width: 30px; height: 30px;
    border-radius: 50%;
    background: linear-gradient(155deg, #3a3a3c, #19191a);
    box-shadow:
      0 3px 6px rgba(0,0,0,0.6),
      0 1px 0 rgba(255,255,255,0.06) inset;
    position: relative;
  }

  .dial::after{
    content:"";
    position:absolute;
    top: 4px; left: 50%;
    width: 2px; height: 8px;
    background: #6b6b6d;
    transform: translateX(-50%);
    border-radius: 1px;
  }

  .label-row{
    display:flex;
    justify-content:center;
    gap: 60px;
    margin-top: 8px;
  }

  .label-row span{
    font-size: 9px;
    letter-spacing: 2px;
    color: #6a6a6d;
    text-transform: uppercase;
  }

  .screws span{
    position:absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #7a7a7c, #2a2a2b 70%);
  }
  .screws .tl{ top: 14px; left: 14px; }
  .screws .tr{ top: 14px; right: 14px; }
  .screws .bl{ bottom: 14px; left: 14px; }
  .screws .br{ bottom: 14px; right: 14px; }

  @media (max-width: 420px){
    .time-main{ font-size: 56px; }
    .time-seconds{ font-size: 22px; }
  }
</style>
</head>
<body>

  <div class="radio">
    <div class="screws">
      <span class="tl"></span><span class="tr"></span>
      <span class="bl"></span><span class="br"></span>
    </div>

    <div class="brand">
      <span>Chrono&nbsp;Deck</span>
      <span class="power"><span class="power-dot"></span>on</span>
    </div>

    <div class="screen">
      <div class="date-row" id="dateDisplay">--- -- ----</div>

      <div class="time-row">
        <span class="time-main" id="hours">--</span>
        <span class="time-main colon">:</span>
        <span class="time-main" id="minutes">--</span>
        <div class="seconds-block">
          <span class="time-seconds" id="seconds">--</span>
          <span class="meridiem" id="meridiem">--</span>
        </div>
      </div>
    </div>

    <div class="controls">
      <div class="dial"></div>
      <div class="dial"></div>
      <div class="dial"></div>
    </div>
    <div class="label-row">
      <span>Alarm</span>
      <span>Tune</span>
      <span>Bright</span>
    </div>
  </div>

<script>
  const hoursEl = document.getElementById('hours');
  const minutesEl = document.getElementById('minutes');
  const secondsEl = document.getElementById('seconds');
  const meridiemEl = document.getElementById('meridiem');
  const dateEl = document.getElementById('dateDisplay');

  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

  function pad(num){
    return num.toString().padStart(2, '0');
  }

  function updateClock(){
    const now = new Date();

    let hours = now.getHours();
    const minutes = now.getMinutes();
    const seconds = now.getSeconds();
    const meridiem = hours >= 12 ? 'PM' : 'AM';

    hours = hours % 12;
    if (hours === 0) hours = 12;

    hoursEl.textContent = pad(hours);
    minutesEl.textContent = pad(minutes);
    secondsEl.textContent = pad(seconds);
    meridiemEl.textContent = meridiem;

    const dayName = days[now.getDay()];
    const monthName = months[now.getMonth()];
    const date = now.getDate();
    const year = now.getFullYear();
    dateEl.textContent = `${dayName} ${monthName} ${pad(date)} ${year}`;
  }

  updateClock();
  setInterval(updateClock, 1000);
</script>

</body>
</html>
